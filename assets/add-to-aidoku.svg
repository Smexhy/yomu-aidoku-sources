<svg xmlns="http://www.w3.org/2000/svg" width="300" height="56" viewBox="0 0 300 56" role="img" aria-label="Add Yomu to Aidoku">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff2e63"/>
      <stop offset="0.55" stop-color="#ff4d8d"/>
      <stop offset="1" stop-color="#ff79c6"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="btn"><rect x="1" y="1" width="298" height="54" rx="14"/></clipPath>
  </defs>
  <rect x="1" y="1" width="298" height="54" rx="14" fill="url(#bg)"/>
  <rect x="1" y="1" width="298" height="26" rx="14" fill="url(#sheen)"/>
  <circle cx="37" cy="28" r="13" fill="#ffffff" fill-opacity="0.22"/>
  <path d="M37 21 v14 M30 28 h14" stroke="#ffffff" stroke-width="3.2" stroke-linecap="round"/>
  <g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Hiragino Sans','Noto Sans CJK JP',Helvetica,Arial,sans-serif" font-size="19" font-weight="700" fill="#ffffff">
    <text x="60" y="34" text-anchor="start">Add</text>
    <text x="154" y="34" text-anchor="start">to Aidoku</text>
    <text x="100" y="34" text-anchor="start" opacity="1">Yomu<animate attributeName="opacity" dur="7s" begin="0s" repeatCount="indefinite" values="0;1;1;0;0" keyTimes="0;0.07;0.43;0.57;1"/></text>
    <text x="124" y="34" text-anchor="middle" opacity="0">よむ<animate attributeName="opacity" dur="7s" begin="3.5s" repeatCount="indefinite" values="0;1;1;0;0" keyTimes="0;0.07;0.43;0.57;1"/></text>
  </g>
  <g clip-path="url(#btn)">
    <g transform="skewX(-18)">
      <rect x="0" y="-14" width="46" height="84" fill="url(#shine)">
        <animateTransform attributeName="transform" type="translate" values="-90 0; 360 0; 360 0" keyTimes="0; 0.3; 1" dur="3.6s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>
  <rect x="1.5" y="1.5" width="297" height="53" rx="13.5" fill="none" stroke="#ffffff" stroke-opacity="0.4"/>
</svg>
